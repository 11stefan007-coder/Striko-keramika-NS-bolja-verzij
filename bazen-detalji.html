<html lang="bs">
<head>
    <meta charset="UTF-8">
    <title>Detalji - Kupatilo</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/css/lightbox.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .back-btn { display: inline-block; margin-bottom: 20px; color: #e67e22; text-decoration: none; font-weight: bold; border: 1px solid #e67e22; padding: 10px 20px; border-radius: 5px; }
        .grid-galerija { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; max-width: 1000px; margin: auto; }
        .grid-galerija img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .grid-galerija img:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <a href="galerija.html" class="back-btn">← NAZAD U GALERIJU</a>
    <h1>Detaljne slike: Bazen</h1>

    <div class="grid-galerija">
       <a href="b1.webp" data-lightbox="moj-bazen" data-title="Slika 1 - Detalj">
    <img src="b1.webp" alt="Bazen 1">
    </a>

    <a href="b2.jpg" data-lightbox="moj-bazen" data-title="Slika 2 - Detalj">
    <img src="b2.jpg" alt="Bazen 2">
    </a>
    <a href="b3.png" data-lightbox="moj-bazen" data-title="Slika 3 - Detalj">
    <img src="b3.png" alt="Bazen 3">
    </a>
        </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/js/lightbox.min.js"></script>
</body>
</html>
