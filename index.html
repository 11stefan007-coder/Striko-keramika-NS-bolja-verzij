<html lang="bs">
<head>
    <meta charset="UTF-8">
    <title>Prijava - Keramika Inžinjering</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 350px; }
        h2 { color: #2c3e50; margin-bottom: 10px; text-transform: uppercase; }
        p { color: #7f8c8d; margin-bottom: 25px; }
        input[type="text"], input[type="password"] { display: block; width: 100%; margin: 15px 0; padding: 12px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        
        /* Stil za odabir pola */
        .gender-selection { text-align: left; margin: 15px 0; border: 1px solid #eee; padding: 10px; border-radius: 5px; }
        .gender-title { font-size: 14px; color: #7f8c8d; margin-bottom: 8px; display: block; }
        .gender-option { display: inline-block; margin-right: 15px; cursor: pointer; font-size: 15px; color: #2c3e50; }
        .gender-option input { margin-right: 5px; cursor: pointer; }

        button { width: 100%; padding: 15px; background: #e67e22; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #d35400; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>KERAMIKA NOVI SAD</h2>
        <p>Pristup portfoliju majstora</p>
        <form action="pocetna.html">
            <input type="text" placeholder="Korisničko ime" required>
            <input type="password" placeholder="Lozinka" required>
            
            <div class="gender-selection">
                <span class="gender-title">Odaberite pol:</span>
                <label class="gender-option">
                    <input type="radio" name="pol" value="muski" required> Muški
                </label>
                <label class="gender-option">
                    <input type="radio" name="pol" value="zenski"> Ženski
                </label>
            </div>

            <button type="submit">PRIJAVI SE</button>
        </form>
    </div>
</body>
</html>
